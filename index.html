<!doctype html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ProductCompare | เปรียบเทียบราคาสินค้าง่ายๆ</title>
    <meta name="description" content="กรอกชื่อ ปริมาณ ราคา แล้วดูรายการเรียงจากถูกสุดไปแพงสุดทันที" />
    <meta name="theme-color" content="#ffd7ba" />
    <link rel="manifest" href="manifest.webmanifest" data-cache-bust="true" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" data-cache-bust="true" />

    <script>
        (() => {
            const cacheBust = String(Date.now());

            document.querySelectorAll("link[data-cache-bust='true']").forEach((link) => {
                const href = link.getAttribute("href");
                if (!href) {
                    return;
                }

                const separator = href.includes("?") ? "&" : "?";
                link.setAttribute("href", `${href}${separator}cb=${cacheBust}`);
            });

            window.__assetCacheBust = cacheBust;
        })();
    </script>
</head>

<body>
    <div class="app-shell">
        <header class="top-header">
            <h1>ProductCompare</h1>
            <p>เปรียบเทียบราคาสินค้าง่ายๆ</p>
        </header>

        <main class="main-stack">
            <section class="panel" aria-labelledby="entryTitle">
                <div class="panel-head">
                    <h2 id="entryTitle">รายการสินค้า</h2>
                </div>

                <p id="errorMessage" class="error-message" aria-live="polite" hidden></p>

                <div id="rowsContainer" class="rows-container" aria-label="รายการอินพุต"></div>

                <div class="action-row">
                    <button id="addRowBtn" class="btn btn-primary" type="button">เพิ่ม</button>
                </div>

                <button id="clearScreenBtn" class="btn btn-danger" type="button">เคลียร์หน้าจอ</button>
            </section>

            <section class="panel" aria-labelledby="resultTitle">
                <div class="panel-head">
                    <h2 id="resultTitle">รายการที่ถูกที่สุด</h2>
                </div>

                <div id="resultsContainer" class="results-container"></div>
            </section>
        </main>
    </div>

    <script>
        (() => {
            const script = document.createElement("script");
            const cacheBust = window.__assetCacheBust || String(Date.now());
            script.src = `app.js?cb=${cacheBust}`;
            script.defer = true;
            document.body.appendChild(script);
        })();
    </script>
</body>

</html>
