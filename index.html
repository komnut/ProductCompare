<!doctype html>
<html lang="th">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>ProductCompare | เปรียบเทียบราคาสินค้าง่ายๆ</title>
    <meta name="description" content="กรอกชื่อ ปริมาณ ราคา แล้วดูรายการเรียงจากถูกสุดไปแพงสุดทันที" />
    <meta name="theme-color" content="#ffd7ba" />
    <link rel="icon" type="image/svg+xml" href="icon-192.svg" data-cache-bust="true" />
    <link rel="shortcut icon" href="icon-192.svg" data-cache-bust="true" />
    <link rel="apple-touch-icon" href="icon-192.svg" data-cache-bust="true" />
    <link rel="manifest" href="manifest.webmanifest" data-cache-bust="true" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;700;800&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" data-cache-bust="true" />

    <script>
        (() => {
            const cacheBust = String(Date.now());

            document.querySelectorAll("link[data-cache-bust='true']").forEach((link) => {
                const href = link.getAttribute("href");
                if (!href) {
                    return;
                }

                const separator = href.includes("?") ? "&" : "?";
                link.setAttribute("href", `${href}${separator}cb=${cacheBust}`);
            });

            window.__assetCacheBust = cacheBust;
        })();
    </script>
</head>

<body>
    <div class="app-shell">
        <header class="top-header">
            <div class="header-row">
                <div>
                    <h1>ProductCompare</h1>
                    <p>เปรียบเทียบราคาสินค้าง่ายๆ</p>
                </div>
                <button id="themeBtn" class="theme-btn" type="button" aria-label="เปลี่ยนธีม" title="เปลี่ยนธีม">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a1 1 0 0 1 .894.553l2.12 4.3 4.733.688a1 1 0 0 1 .554 1.706l-3.425 3.34.808 4.712a1 1 0 0 1-1.45 1.054L12 17.27l-4.234 2.083a1 1 0 0 1-1.45-1.054l.808-4.712-3.425-3.34a1 1 0 0 1 .554-1.706l4.733-.688 2.12-4.3A1 1 0 0 1 12 3z"/></svg>
                </button>
            </div>
        </header>

        <main class="main-stack">
            <p id="errorMessage" class="error-message" aria-live="polite" hidden></p>

            <div id="rowsContainer" class="rows-container" aria-label="รายการสินค้า"></div>

            <div class="action-bar">
                <button id="addRowBtn" class="btn btn-add" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 4a1 1 0 0 1 1 1v6h6a1 1 0 1 1 0 2h-6v6a1 1 0 1 1-2 0v-6H5a1 1 0 1 1 0-2h6V5a1 1 0 0 1 1-1z"/></svg>
                    เพิ่มรายการ
                </button>
                <button id="clearScreenBtn" class="btn btn-clear" type="button">เคลียร์</button>
            </div>
        </main>
    </div>

    <script>
        (() => {
            const script = document.createElement("script");
            const cacheBust = window.__assetCacheBust || String(Date.now());
            script.src = `app.js?cb=${cacheBust}`;
            script.defer = true;
            document.body.appendChild(script);
        })();
    </script>
</body>

</html>
